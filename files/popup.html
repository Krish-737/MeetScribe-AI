<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
    body { width: 240px; padding: 16px; background: #fff; }
    h1 { font-size: 15px; font-weight: 600; color: #111; margin-bottom: 4px; }
    p  { font-size: 12px; color: #888; margin-bottom: 16px; }
    #status {
      font-size: 12px;
      padding: 8px 12px;
      border-radius: 8px;
      background: #f1f5f9;
      color: #555;
      margin-bottom: 12px;
      text-align: center;
    }
    #status.live { background: #fee2e2; color: #dc2626; font-weight: 600; }
    button {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      background: #6366f1;
      color: #fff;
      margin-bottom: 8px;
    }
    button:disabled { opacity: 0.4; cursor: default; }
    #not-meeting { font-size: 12px; color: #aaa; text-align: center; padding: 8px 0; }
  </style>
</head>
<body>
  <h1>MeetScribe</h1>
  <p>AI transcription for Google Meet &amp; Zoom</p>
  <div id="status">Checking...</div>
  <div id="controls" style="display:none">
    <button id="btn-toggle">Start recording</button>
  </div>
  <div id="not-meeting" style="display:none">
    Open a Google Meet or Zoom meeting first.
  </div>
  <script src="popup.js"></script>
</body>
</html>
