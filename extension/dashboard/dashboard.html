<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MeetScribe Dashboard</title>
  <style>
    body {
      font-family: -apple-system, system-ui, sans-serif;
      background: #f8fafc;
      color: #1e293b;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: white;
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
      width: 480px;
      text-align: center;
    }
    h1 { font-size: 24px; margin-bottom: 16px; color: #6366f1; }
    p { color: #64748b; line-height: 1.6; margin-bottom: 24px; }
    button {
      background: #6366f1;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 16px;
      transition: background 0.2s;
    }
    button:hover { background: #4f46e5; }
    .step { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 16px; text-align: left; }
    .num { background: #e2e8f0; color: #475569; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="card">
    <h1>MeetScribe Desktop Mode</h1>
    <p>Follow these steps to transcribe your Teams Meeting:</p>
    
    <div class="step">
      <div class="num">1</div>
      <div>Click the <b>"Launch Transcriber"</b> button below.</div>
    </div>
    <div class="step">
      <div class="num">2</div>
      <div>In the Chrome dialog, select the <b>"Entire Screen"</b> tab.</div>
    </div>
    <div class="step">
      <div class="num">3</div>
      <div>Toggle the switch for <b>"Share system audio"</b>.</div>
    </div>
    <div class="step">
      <div class="num">4</div>
      <div>Click the screen thumbnail, then click <b>"Share"</b>.</div>
    </div>

    <button id="launch-btn">Launch Floating Transcriber</button>
  </div>
  <script src="dashboard.js"></script>
</body>
</html>
